<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumi - Your AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #f4f7fc;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(90deg, #007BFF, #0056b3);
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .chat-box {
            max-height: 400px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 8px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        .input-box {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #007BFF, #0056b3);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background: #0056b3;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #333;
            color: white;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>Welcome to Lumi - Your AI Chatbot</header>
    <div class="container">
        <h1>Lumi - Your AI Chatbot</h1>
        <div class="chat-box" id="chat-box">
            <p><strong>Lumi:</strong> Hello! How can I assist you today?</p>
        </div>
        <input type="text" id="user-input" class="input-box" placeholder="Type your message...">
        <button class="btn" onclick="sendMessage()">Send</button>
    </div>
    <footer>&copy; 2025 Lumi Chatbot Team. All rights reserved.</footer>
    <script>
        function sendMessage() {
            var userInput = document.getElementById("user-input").value;
            if (userInput.trim() !== "") {
                var chatBox = document.getElementById("chat-box");
                chatBox.innerHTML += `<p><strong>You:</strong> ${userInput}</p>`;
                fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 'prompt': userInput })
                })
                .then(response => response.json())
                .then(data => {
                    chatBox.innerHTML += `<p><strong>Lumi:</strong> ${data.response}</p>`;
                    chatBox.scrollTop = chatBox.scrollHeight;
                })
                .catch(() => {
                    chatBox.innerHTML += `<p><strong>Lumi:</strong> Error processing request.</p>`;
                });
            }
            document.getElementById("user-input").value = "";
        }
    </script>
</body>
</html>
